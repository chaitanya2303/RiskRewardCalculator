<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk Reward Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1a1a;
    --card-bg: #ffffff;
    --card-border: #e8e8e8;
    --text-primary: #111111;
    --text-secondary: #666666;
    --text-muted: #999999;
    --input-bg: #ffffff;
    --input-border: #d0d0d0;
    --input-focus: #1a6ef8;
    --tab-active-bg: #1a6ef8;
    --tab-active-text: #ffffff;
    --tab-text: #1a6ef8;
    --tab-border: #d0d8f5;
    --tab-bg: #ffffff;
    --result-bg: #f5f7ff;
    --result-border: #dde3f8;
    --profit-color: #16a34a;
    --loss-color: #dc2626;
    --clear-bg: #e8442a;
    --clear-hover: #c93520;
    --toggle-bg: #22c55e;
    --live-dot: #ef4444;
    --shadow: 0 20px 60px rgba(0,0,0,0.18), 0 4px 16px rgba(0,0,0,0.10);
    --label-weight: 600;
  }

  [data-theme="dark"] {
    --bg: #111111;
    --card-bg: #1e1e1e;
    --card-border: #2e2e2e;
    --text-primary: #f0f0f0;
    --text-secondary: #a0a0a0;
    --text-muted: #666666;
    --input-bg: #2a2a2a;
    --input-border: #3a3a3a;
    --input-focus: #4a8eff;
    --tab-active-bg: #1a6ef8;
    --tab-active-text: #ffffff;
    --tab-text: #7aa8ff;
    --tab-border: #2a3550;
    --tab-bg: #1e1e1e;
    --result-bg: #1a2035;
    --result-border: #2a3050;
    --profit-color: #22c55e;
    --loss-color: #f87171;
    --shadow: 0 20px 60px rgba(0,0,0,0.5), 0 4px 16px rgba(0,0,0,0.3);
    --label-weight: 500;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    transition: background 0.3s;
  }

  .card {
    background: var(--card-bg);
    border-radius: 18px;
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 500px;
    padding: 24px 28px 28px;
    border: 1px solid var(--card-border);
    transition: background 0.3s, border-color 0.3s;
  }

  /* Header */
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .live-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .live-dot {
    width: 9px; height: 9px;
    background: var(--live-dot);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.2); }
  }

  .live-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--live-dot);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: 'JetBrains Mono', monospace;
  }

  .datetime {
    font-size: 12px;
    color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 400;
  }

  .header-mid {
    text-align: center;
    margin: 10px 0 16px;
    position: relative;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }

  .toggle-wrap {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
  }

  .toggle {
    appearance: none;
    width: 44px; height: 24px;
    background: var(--toggle-bg);
    border-radius: 12px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
  }

  .toggle::before {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    background: white;
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  [data-theme="dark"] .toggle::before { transform: translateX(20px); }
  [data-theme="dark"] .toggle { background: #4a8eff; }

  /* Market tabs */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .tab {
    flex: 1;
    padding: 9px 6px;
    border-radius: 10px;
    border: 1.5px solid var(--tab-border);
    background: var(--tab-bg);
    color: var(--tab-text);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }

  .tab:hover { border-color: var(--input-focus); }
  .tab.active {
    background: var(--tab-active-bg);
    color: var(--tab-active-text);
    border-color: var(--tab-active-bg);
  }

  /* Fields */
  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 13px;
    font-weight: var(--label-weight);
    color: var(--text-primary);
    margin-bottom: 7px;
  }

  .field label .sub {
    font-weight: 400;
    color: var(--text-muted);
    font-size: 12px;
    margin-left: 4px;
  }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  input[type="number"], input[type="text"], select {
    width: 100%;
    height: 46px;
    padding: 0 14px;
    border-radius: 10px;
    border: 1.5px solid var(--input-border);
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
    -moz-appearance: textfield;
    appearance: textfield;
  }

  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button { -webkit-appearance: none; }

  input:focus, select:focus {
    border-color: var(--input-focus);
    box-shadow: 0 0 0 3px rgba(26,110,248,0.12);
  }

  input::placeholder { color: var(--text-muted); font-size: 14px; }

  .input-suffix {
    position: relative;
  }
  .input-suffix input { padding-right: 40px; }
  .input-suffix span {
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 500;
    pointer-events: none;
  }

  /* Trade counter */
  .trade-counter {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1.5px solid var(--input-border);
    border-radius: 10px;
    overflow: hidden;
    height: 46px;
    background: var(--input-bg);
  }

  .trade-counter button {
    width: 40px; height: 100%;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--text-secondary);
    transition: background 0.15s, color 0.15s;
    font-family: 'DM Sans', sans-serif;
    flex-shrink: 0;
  }

  .trade-counter button:hover { background: var(--result-bg); color: var(--input-focus); }

  .trade-counter .count {
    flex: 1;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
  }

  /* Quantity with lot size */
  .qty-wrap {
    display: flex;
    gap: 8px;
  }

  .qty-wrap input { flex: 1; }
  .qty-wrap select {
    width: 100px;
    padding: 0 10px;
    font-size: 13px;
    flex-shrink: 0;
  }

  /* Results */
  .results {
    background: var(--result-bg);
    border: 1.5px solid var(--result-border);
    border-radius: 12px;
    padding: 16px;
    margin-top: 4px;
    margin-bottom: 16px;
  }

  .results-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }

  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  .result-item { text-align: center; }

  .result-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 3px;
    font-weight: 500;
  }

  .result-val {
    font-size: 17px;
    font-weight: 700;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
  }

  .result-val.profit { color: var(--profit-color); }
  .result-val.loss { color: var(--loss-color); }
  .result-val.info { color: var(--input-focus); }

  .divider {
    height: 1px;
    background: var(--result-border);
    margin: 10px 0;
  }

  /* Max risk row */
  .max-risk-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--result-bg);
    border: 1.5px solid var(--result-border);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 16px;
  }

  .max-risk-row .lbl { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
  .max-risk-row .val {
    font-size: 15px;
    font-weight: 700;
    color: var(--loss-color);
    font-family: 'JetBrains Mono', monospace;
  }

  /* Target input row */
  .target-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 16px;
  }

  /* Buttons */
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .btn-clear {
    height: 50px;
    border-radius: 12px;
    background: var(--clear-bg);
    color: white;
    border: none;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: -0.01em;
  }

  .btn-clear:hover { background: var(--clear-hover); }
  .btn-clear:active { transform: scale(0.98); }

  .btn-calc {
    height: 50px;
    border-radius: 12px;
    background: var(--input-focus);
    color: white;
    border: none;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: -0.01em;
  }

  .btn-calc:hover { background: #1558cc; }
  .btn-calc:active { transform: scale(0.98); }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="card">
  <div class="header-top">
    <div class="live-indicator">
      <div class="live-dot"></div>
      <span class="live-label">Live</span>
    </div>
    <div class="datetime" id="clock"></div>
  </div>

  <div class="header-mid">
    <h1>Risk Reward Calculator</h1>
    <div class="toggle-wrap">
      <input type="checkbox" class="toggle" id="themeToggle" title="Toggle dark mode">
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-market="nifty50" onclick="setMarket(this)">Nifty 50</button>
    <button class="tab" data-market="banknifty" onclick="setMarket(this)">Bank Nifty</button>
    <button class="tab" data-market="sensex" onclick="setMarket(this)">Sensex</button>
    <button class="tab" data-market="stock" onclick="setMarket(this)">Stock</button>
  </div>

  <div class="field">
    <label>Trading Capital</label>
    <input type="number" id="capital" placeholder="Enter Your Capital (₹)" oninput="calculate()">
  </div>

  <div class="row2">
    <div class="field">
      <label>Daily Trades <span class="sub" id="trade-fraction">3/3</span></label>
      <div class="trade-counter">
        <button onclick="changeTrade(-1)">−</button>
        <span class="count" id="tradeCount">3</span>
        <button onclick="changeTrade(1)">+</button>
      </div>
    </div>
    <div class="field">
      <label>Daily Risk %</label>
      <div class="input-suffix">
        <input type="number" id="riskPct" placeholder="e.g. 2" step="0.1" oninput="calculate()">
        <span>%</span>
      </div>
    </div>
  </div>

  <div id="maxRiskRow" class="max-risk-row hidden">
    <span class="lbl">Max Risk / Trade</span>
    <span class="val" id="maxRiskVal">₹0</span>
  </div>

  <div class="row2">
    <div class="field">
      <label>Entry Price</label>
      <input type="number" id="entry" placeholder="Enter Entry Price" oninput="calculate()">
    </div>
    <div class="field">
      <label>Quantity / Lots</label>
      <div class="qty-wrap">
        <input type="number" id="quantity" placeholder="Qty" oninput="calculate()">
        <select id="lotSize" onchange="onLotChange()" title="Select lot size">
          <option value="1">Custom</option>
          <option value="75" selected>75 (1 lot)</option>
          <option value="150">150 (2 lots)</option>
          <option value="225">225 (3 lots)</option>
          <option value="300">300 (4 lots)</option>
          <option value="375">375 (5 lots)</option>
        </select>
      </div>
    </div>
  </div>

  <div class="target-row">
    <div class="field">
      <label>Stop Loss Price</label>
      <input type="number" id="stopLoss" placeholder="Enter Stop Loss" oninput="calculate()">
    </div>
    <div class="field">
      <label>Target Price</label>
      <input type="number" id="target" placeholder="Enter Target" oninput="calculate()">
    </div>
  </div>

  <div id="resultsBox" class="results hidden">
    <div class="results-title">Calculated Results</div>
    <div class="results-grid">
      <div class="result-item">
        <div class="result-label">Risk (₹)</div>
        <div class="result-val loss" id="res-risk">—</div>
      </div>
      <div class="result-item">
        <div class="result-label">Reward (₹)</div>
        <div class="result-val profit" id="res-reward">—</div>
      </div>
      <div class="result-item">
        <div class="result-label">R:R Ratio</div>
        <div class="result-val info" id="res-rr">—</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="results-grid">
      <div class="result-item">
        <div class="result-label">Risk %</div>
        <div class="result-val loss" id="res-riskpct">—</div>
      </div>
      <div class="result-item">
        <div class="result-label">Reward %</div>
        <div class="result-val profit" id="res-rewpct">—</div>
      </div>
      <div class="result-item">
        <div class="result-label">Break-even Win%</div>
        <div class="result-val" id="res-winrate">—</div>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-clear" onclick="clearAll()">Clear</button>
    <button class="btn-calc" onclick="calculate()">Calculate</button>
  </div>
</div>

<script>
const LOT_SIZES = {
  nifty50: [
    {label:'75 (1 lot)',value:75},{label:'150 (2 lots)',value:150},
    {label:'225 (3 lots)',value:225},{label:'300 (4 lots)',value:300},{label:'375 (5 lots)',value:375}
  ],
  banknifty: [
    {label:'30 (1 lot)',value:30},{label:'60 (2 lots)',value:60},
    {label:'90 (3 lots)',value:90},{label:'120 (4 lots)',value:120},{label:'150 (5 lots)',value:150}
  ],
  sensex: [
    {label:'20 (1 lot)',value:20},{label:'40 (2 lots)',value:40},
    {label:'60 (3 lots)',value:60},{label:'80 (4 lots)',value:80},{label:'100 (5 lots)',value:100}
  ],
  stock: [
    {label:'Custom',value:1}
  ]
};

let currentMarket = 'nifty50';
let maxTrades = 3;
let currentTrades = 3;

function setMarket(btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentMarket = btn.dataset.market;
  updateLotOptions();
  calculate();
}

function updateLotOptions() {
  const sel = document.getElementById('lotSize');
  const lots = LOT_SIZES[currentMarket];
  sel.innerHTML = '<option value="1">Custom</option>' +
    lots.map(l => `<option value="${l.value}">${l.label}</option>`).join('');
  if (lots.length > 1) sel.selectedIndex = 1;
  onLotChange();
}

function onLotChange() {
  const sel = document.getElementById('lotSize');
  const val = +sel.value;
  if (val > 1) document.getElementById('quantity').value = val;
  calculate();
}

function changeTrade(delta) {
  currentTrades = Math.max(1, Math.min(maxTrades, currentTrades + delta));
  document.getElementById('tradeCount').textContent = currentTrades;
  document.getElementById('trade-fraction').textContent = currentTrades + '/' + maxTrades;
  calculate();
}

function fmt(n) {
  if (isNaN(n) || !isFinite(n)) return '—';
  return n.toLocaleString('en-IN', {minimumFractionDigits: 0, maximumFractionDigits: 2});
}

function calculate() {
  const capital = +document.getElementById('capital').value || 0;
  const riskPct = +document.getElementById('riskPct').value || 0;
  const entry = +document.getElementById('entry').value || 0;
  const qty = +document.getElementById('quantity').value || 0;
  const sl = +document.getElementById('stopLoss').value || 0;
  const target = +document.getElementById('target').value || 0;

  // Max risk per trade
  const dailyRiskAmt = capital * (riskPct / 100);
  const riskPerTrade = currentTrades > 0 ? dailyRiskAmt / currentTrades : 0;

  if (capital > 0 && riskPct > 0) {
    document.getElementById('maxRiskRow').style.display = 'flex';
    document.getElementById('maxRiskVal').textContent = '₹' + fmt(riskPerTrade);
  } else {
    document.getElementById('maxRiskRow').style.display = 'none';
  }

  if (!entry || !qty || !sl) {
    document.getElementById('resultsBox').style.display = 'none';
    return;
  }

  const riskPts = entry - sl;
  const rewardPts = target ? target - entry : 0;
  const riskAmt = riskPts * qty;
  const rewardAmt = rewardPts * qty;
  const rr = riskPts !== 0 ? Math.abs(rewardPts / riskPts) : 0;
  const riskPctVal = entry > 0 ? (Math.abs(riskPts) / entry) * 100 : 0;
  const rewPctVal = entry > 0 ? (Math.abs(rewardPts) / entry) * 100 : 0;
  const winRate = rr > 0 ? (1 / (1 + rr)) * 100 : 0;

  document.getElementById('res-risk').textContent = '₹' + fmt(Math.abs(riskAmt));
  document.getElementById('res-reward').textContent = target ? '₹' + fmt(Math.abs(rewardAmt)) : '—';
  document.getElementById('res-rr').textContent = target ? '1 : ' + fmt(rr) : '—';
  document.getElementById('res-riskpct').textContent = fmt(riskPctVal) + '%';
  document.getElementById('res-rewpct').textContent = target ? fmt(rewPctVal) + '%' : '—';
  document.getElementById('res-winrate').textContent = target ? fmt(winRate) + '%' : '—';

  document.getElementById('resultsBox').style.display = 'block';
}

function clearAll() {
  ['capital','riskPct','entry','quantity','stopLoss','target'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('resultsBox').style.display = 'none';
  document.getElementById('maxRiskRow').style.display = 'none';
  currentTrades = 3;
  document.getElementById('tradeCount').textContent = '3';
  document.getElementById('trade-fraction').textContent = '3/3';
  updateLotOptions();
}

// Clock
function updateClock() {
  const now = new Date();
  const opts = {weekday:'short',year:'numeric',month:'short',day:'2-digit',
    hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true};
  document.getElementById('clock').textContent =
    now.toLocaleDateString('en-IN',{weekday:'short',year:'numeric',month:'short',day:'2-digit'}) +
    ', ' + now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true}).toUpperCase();
}
setInterval(updateClock, 1000);
updateClock();

// Theme toggle
document.getElementById('themeToggle').addEventListener('change', function() {
  document.documentElement.setAttribute('data-theme', this.checked ? 'dark' : 'light');
});

// Init
updateLotOptions();
</script>
</body>
</html>
